<!DOCTYPE html>
<html>
  <head>

    <title>Aula de Formulários</title>

  </head>
  <body>

    <h2>Aula sobre formulários em HTML</h2>

    <form>

      <div>
      <label for="nome">Nome: 
      <input type="text" required>
      </label>
      </div>

      <br>

      <div>
      <label for="idade">Idade: 
      <input type="number" min="0" max="120" required>
      </label>
      </div>

      <br>

      <div>
      <label for="usuario">Usuário: 
      <input type="idade" required>
      </label>
      </div>

      <br>

      <div>
      <label for="senha">Senha: 
      <input type="password" required>
      </label>
      </div>

      <br>

      <div>
      <label for="data">Data do Evento: 
      <input type="datetime-local" required>
      </label>
      </div>

      <br>

      <div>
      <label for="telefone">Número de Telefone: 
      <input type="tel" required placeholder=" (XX) XXXXX-XXXX">
      </label>
      </div>

      <br>

      <div>
      <label for="email">Endereço de Email: 
      <input type="email" required placeholder=" user@example.org">
      </label>
      </div>

      <br>

      <div>
      <label for="peso">Peso:
      <input type="number" required min="0" max="4000" step="20">
      </label>
      </div>

      <br>

      <button type="submit">Enviar</button>

    </form>

  </body>
</html>
