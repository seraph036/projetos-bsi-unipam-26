<!DOCTYPE html>
<html>
  <head>

    <title>Aula de Formulários</title>

  </head>
  <body>

    <h2>Aula sobre formulários em HTML</h2>

    <form>

      <div>
      <label for="nome">Nome: 
      <input type="text" required>
      </label>
      </div>

      <br>

      <div>
      <label for="idade">Idade: 
      <input type="number" min="0" max="120" required>
      </label>
      </div>

      <br>

      <div>
      <label for="usuario">Usuário: 
      <input type="idade" required>
      </label>
      </div>

      <br>

      <div>
      <label for="senha">Senha: 
      <input type="password" required>
      </label>
      </div>

      <br>

      <div>
      <label for="data">Data do Evento: 
      <input type="datetime-local" required>
      </label>
      </div>

      <br>

      <div>
      <label for="telefone">Número de Telefone: 
      <input type="tel" required placeholder=" (XX) XXXXX-XXXX">
      </label>
      </div>

      <br>

      <div>
      <label for="email">Endereço de Email: 
      <input type="email" required placeholder=" user@example.org">
      </label>
      </div>

      <br>

      <div>
      <label for="peso">Peso:
      <input type="number" required min="0" max="4000" step="20">
      </label>
      </div>

      <br>

      <div>
        <fieldset>
          <legend>Estado Civil</legend>
          <p>
            <label>
              <input type="radio" name="estCivil" value="solteiro">Solteiro
            </label>
          </p>
          <p>
            <label>
              <input type="radio" name="estCivil" value="casado">Casado
            </label>
          </p>
          <p>
            <label>
              <input type="radio" name="estCivil" value="divorciado">Divorciado
            </label>
          </p>
        </fieldset>
      </div>

      <br>

      <div>
        <fieldset>
          <legend>Lista de Compras</legend>
          <p>
            <label>
              <input type="checkbox" name="mouse" value="mouse">Mouse
            </label>
          </p>
          <p>
            <label>
              <input type="checkbox" name="teclado" value="teclado">Teclado
            </label>
          </p>
          <p>
            <label>
              <input type="checkbox" name="monitor" value="monitor">Monitor
            </label>
          </p>
          <p>
            <label>
              <input type="checkbox" name="impressora" value="impressora">Impressora
            </label>
          </p>
        </fieldset>
      </div>

      <br>

      <div>
        <p>
          <label>
            Site: <input type="url" list="sites" name="link">
          </label>
        </p>
        <datalist id="sites">
          <option label="website" value="seraph036.github.io/luminarium"></option>
          <option label="github" value="github.com/seraph036"></option>
          <option label="linkedin" value="linkedin.com/p/alexandre-hipgalvao"></option>
        </datalist>
      </div>

      <br>

      <div>
      <label>
      Deixe sua sugestão: 
      <textarea cols="30" rows="5"></textarea>
      </label>
      </div>

      <br>
      
      <button type="submit">Enviar</button>

      <br>

    </form>

  </body>
</html>
